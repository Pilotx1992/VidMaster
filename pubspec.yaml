name: vidmaster
description: All-in-One Video & Music Player
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Video Engine
  media_kit: ^1.2.0
  media_kit_video: ^2.0.1
  # Native playback dependencies (includes libmpv.so inside APK via build-time artifacts)
  media_kit_libs_video: ^1.0.7
  wakelock_plus: ^1.2.8
  # ffmpeg_kit_flutter_* (Arthenica) is discontinued and its Maven artifacts may be removed.
  # Use the maintained fork to keep Android builds deterministic.
  ffmpeg_kit_flutter_new: ^4.1.0

  # 🔊 Audio Engine
  just_audio: ^0.9.46
  audio_service: ^0.18.15
  on_audio_query: ^2.9.0
  flutter_chrome_cast: ^1.2.6

  # ⬇️ Downloader
  flutter_downloader: ^1.11.9
  dio: ^5.7.0
  youtube_explode_dart: ^3.0.5

  # 🧠 State Management
  flutter_riverpod: ^2.6.1
  dartz: ^0.10.1
  fpdart: ^1.1.0

  # 🗄️ Database
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 🔐 Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6
  bcrypt: ^1.1.3

  # 🧭 Navigation
  go_router: ^17.2.3

  # 📁 Files & Permissions
  permission_handler: ^12.0.1
  path_provider: ^2.1.2
  file_picker: ^8.1.7

  # 📤 Sharing
  share_plus: ^10.1.4

  # 🔔 Notifications
  flutter_local_notifications: ^18.0.1

  # 🖼️ Thumbnails
  video_thumbnail: ^0.5.3

  # 🌐 Connectivity
  connectivity_plus: ^6.1.1

  # 🔒 Screen Protection
  flutter_windowmanager: ^0.2.0

  # 💾 Preferences
  shared_preferences: ^2.3.5

  # 🧰 Utils
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  photo_manager: ^3.9.0
  uuid: ^4.5.3
  cached_network_image: ^3.4.1
  # Removed: depends on build_tool inside pub cache (breaks Android builds)

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # 🗄️ Isar Generator
  isar_community_generator: ^3.3.2
  build_runner: ^2.4.14

  integration_test:
    sdk: flutter

  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  # Upstream plugin still uses V1 embedding on pub.dev; Flutter 3.29+ removed Registrar.
  flutter_windowmanager:
    git:
      url: https://github.com/adaptant-labs/flutter_windowmanager.git
      ref: b79d79f

  # sqflite_android 2.4.2+3 uses APIs not available on our compileSdk toolchain.
  sqflite: 2.4.1
  sqflite_android: 2.4.1

flutter:
  uses-material-design: true

# Regenerate launcher icons after changing image_path:
#   dart run flutter_launcher_icons
# Then: flutter clean && flutter run … (or uninstall the app so the launcher cache refreshes)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/logo.png